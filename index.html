<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MoneyPrinterTurbo Video Preview</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: #0d1117;
      }

      main {
        width: min(1120px, calc(100% - 32px));
      }

      video {
        display: block;
        width: 100%;
        max-height: calc(100vh - 96px);
        margin: auto;
        background: #000;
      }

      p {
        margin: 16px 0 0;
        color: #f0f6fc;
        text-align: center;
      }

      a {
        color: #58a6ff;
      }
    </style>
  </head>
  <body>
    <main>
      <video id="video" controls preload="metadata" playsinline></video>
      <p id="message">Loading video...</p>
    </main>
    <script>
      const fileName = new URLSearchParams(window.location.search).get("video") || "";
      const isValidFile = /^[a-zA-Z0-9._-]+\.mp4$/.test(fileName);
      const video = document.querySelector("#video");
      const message = document.querySelector("#message");

      if (isValidFile) {
        video.src = `https://github.com/harry0703/mpt-assets/releases/download/assets/${encodeURIComponent(fileName)}`;
        video.addEventListener("loadedmetadata", () => {
          message.hidden = true;
        });
        video.addEventListener("error", () => {
          message.textContent = "The video could not be loaded.";
        });
      } else {
        video.hidden = true;
        message.innerHTML = 'Select a video from the <a href="https://github.com/harry0703/MoneyPrinterTurbo">MoneyPrinterTurbo gallery</a>.';
      }
    </script>
  </body>
</html>
